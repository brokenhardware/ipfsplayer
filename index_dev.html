<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Player</title>
    <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
    <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
    <style>
        html, body { height:100%; margin:0; padding:0; overflow:hidden; background: #000; }
        .video-js .vjs-big-play-button {
            background: none !important; border: none !important; box-shadow: none !important;
            width: 80px !important; height: 80px !important;
            top: 50% !important; left: 50% !important; margin:-40px 0 0 -40px;
        }
        .video-js .vjs-big-play-button img { width: 80px; height: 80px; display: block; }
    </style>
</head>

<body>

<video id="JustVideo" class="video-js" controls preload="auto" poster="loading_720p.webp"></video>

<script type="module">
    // Импортируем современные библиотеки для работы с CID напрямую через ESM
    import { CID } from 'https://esm.sh/multiformats/cid';
    import { base32 } from 'https://esm.sh/multiformats/bases/base32';

    const param = window.location.hash.substring(1);
    const links = param.split("-");
    const player = videojs('JustVideo', { fill: true, playbackRates: [0.5, 1, 1.5, 2] });
    let dwbdeupwvnd = true;

    // Конвертация CID в v1 Base32 (для субдоменов dweb.link)
    function convertToV1(cidStr) {
        try {
            const c = CID.parse(cidStr.trim());
            return c.toV1().toString(base32.encoder);
        } catch (e) {
            console.error("Ошибка парсинга CID:", cidStr, e);
            return cidStr;
        }
    }

    async function startPlayer() {
        if (links.length < 2) return;

        const posterCid = links[0];
        const manifestCid = links[1];

        // 1. Устанавливаем постер (через субдомен)
        const posterV1 = convertToV1(posterCid);
        player.poster(`https://${posterV1}.ipfs.dweb.link`);

        // 2. Обработка манифеста m3u8
        try {
            // Используем ipfs.io для первичного fetch, так как он часто лучше отдает CORS для текстовых файлов
            const fetchUrl = `https://ipfs.io/ipfs/${manifestCid}?filename=video.m3u8`;
            
            const response = await fetch(fetchUrl);
            if (!response.ok) throw new Error('Gateway error');
            
            let content = await response.text();

            // Регулярка ищет ссылки https://ipfs.io/ipfs/CID... и заменяет их на субдомены dweb.link
            const regex = /https:\/\/ipfs\.io\/ipfs\/([a-zA-Z0-9]+)(?:\?filename=([^\s"']+))?/g;
            
            content = content.replace(regex, (match, cid, filename) => {
                const v1 = convertToV1(cid);
                // Формируем вид https://CID.ipfs.dweb.link/filename
                return `https://${v1}.ipfs.dweb.link${filename ? '/' + filename : ''}`;
            });

            // Создаем Blob из модифицированного текста
            const blob = new Blob([content], { type: 'application/x-mpegURL' });
            const blobUrl = URL.createObjectURL(blob);

            player.src({ src: blobUrl, type: "application/x-mpegURL" });

        } catch (e) {
            console.warn("CORS/Fetch error, fallback to direct dweb.link:", e);
            // Если fetch не удался, просто даем прямую ссылку (замена внутри m3u8 не сработает)
            player.src({ 
                src: `https://dweb.link/ipfs/${manifestCid}?filename=video.m3u8`, 
                type: "application/x-mpegURL" 
            });
        }
    }

    // Запуск при загрузке
    window.addEventListener('load', () => {
        startPlayer();

        player.on('play', () => {
            if (links.length === 5 && dwbdeupwvnd) {
                fetch('https://telegra.ph/' + links[2] + '-' + links[3] + '-' + links[4]).catch(() => {});
                dwbdeupwvnd = false;
            }
        });

        player.ready(() => {
            const bigPlay = player.getChild('BigPlayButton');
            if (bigPlay) bigPlay.el().innerHTML = '<img src="play_icon.svg" />';
        });
    });
</script>

</body>
</html>
